services:
  backend:
    ports: []
    env_file: []
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NOTION_API_VERSION=2025-09-03
    secrets:
      - notion_api_key
      - notion_database_id
      - notion_data_source_id
      - notion_pages_data_source_id
      - cache_invalidate_secret
    networks:
      - proxy-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.blog-api.entrypoints=https"
        - "traefik.http.routers.blog-api.rule=Host(`${SITE_DOMAIN:-gaming.fakejack.dev}`) && (PathPrefix(`/api`) || Path(`/health`))"
        - "traefik.http.routers.blog-api.tls.certresolver=http"
        - "traefik.http.routers.blog-api.service=blog-api"
        - "traefik.http.routers.blog-api.middlewares=blog-headers@swarm,blog-compress@swarm"
        - "traefik.http.services.blog-api.loadbalancer.server.port=8000"

  frontend:
    ports: []
    env_file: []
    environment:
      - BACKEND_URL=http://backend:8000
      - NUXT_PUBLIC_SITE_URL=${NUXT_PUBLIC_SITE_URL:-https://gaming.fakejack.dev}
    networks:
      - proxy-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.blog.entrypoints=https"
        - "traefik.http.routers.blog.rule=Host(`${SITE_DOMAIN:-gaming.fakejack.dev}`)"
        - "traefik.http.routers.blog.tls.certresolver=http"
        - "traefik.http.routers.blog.service=blog"
        - "traefik.http.routers.blog.priority=1"
        - "traefik.http.routers.blog.middlewares=blog-headers@swarm,blog-compress@swarm"
        - "traefik.http.services.blog.loadbalancer.server.port=3000"
        # Shared middlewares (defined once, used by both routers)
        - "traefik.http.middlewares.blog-headers.headers.customresponseheaders.X-Content-Type-Options=nosniff"
        - "traefik.http.middlewares.blog-headers.headers.customresponseheaders.X-Frame-Options=DENY"
        - "traefik.http.middlewares.blog-headers.headers.customresponseheaders.Referrer-Policy=strict-origin-when-cross-origin"
        - "traefik.http.middlewares.blog-compress.compress=true"

  redis:
    ports: []
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 128M

secrets:
  notion_api_key:
    external: true
  notion_database_id:
    external: true
  notion_data_source_id:
    external: true
  notion_pages_data_source_id:
    external: true
  cache_invalidate_secret:
    external: true

volumes:
  redis-data:

networks:
  proxy-net:
    external: true
